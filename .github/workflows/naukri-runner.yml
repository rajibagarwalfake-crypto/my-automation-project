name: Hourly Indian Business Hours Naukri Automation

on:
  schedule:
    - cron: '0 2-11 * * *'
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Selenium Tools Directly
      run: |
        wget https://repo1.maven.org/maven2/org/seleniumhq/selenium/selenium-server/4.0.0-alpha-2/selenium-server-4.0.0-alpha-2.jar

    - name: Compile Java Code
      run: |
        javac -cp selenium-server-4.0.0-alpha-2.jar src/main/java/com/nauklri/in_the_background.java

    - name: Execute Java Code
      env:
        NAUKRI_USERNAME: ${{ secrets.NAUKRI_USERNAME }}
        NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
      run: |
        java -cp selenium-server-4.0.0-alpha-2.jar:src/main/java com.nauklri.in_the_background
